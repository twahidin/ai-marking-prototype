# Railway / Nixpacks build configuration.
#
# WeasyPrint (used by pdf_generator.py to render HTML → PDF, with embedded
# MathML for LaTeX equations and Noto fonts for CJK / Tamil / Latin) needs
# system-level Pango, fontconfig and a font set. Without these the import
# itself fails at boot. pdf2image still needs poppler for the PDF-to-image
# conversion path used by OpenAI / Qwen marking, so we keep that here too.
[phases.setup]
nixPkgs = [
    "python311",
    "pango",
    "harfbuzz",
    "fontconfig",
    "freetype",
    "glib",
    "gobject-introspection",
    "noto-fonts",
    "noto-fonts-cjk-sans",
    "noto-fonts-cjk-serif",
    "noto-fonts-emoji",
    "poppler_utils",
]
