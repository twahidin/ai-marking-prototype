{% extends "base.html" %}

{% block title %}Subject standards{% endblock %}

{% block body %}
<div class="container" style="max-width:900px;">
    <a href="/dashboard" class="back-link">&larr; Back</a>
    <div class="header"><h1>Subject standards</h1></div>

    <div class="card" style="margin-top:16px;">
        <h2>Pending review</h2>
        <div id="pending-list" style="font-size:13px;color:#555;">Loading&hellip;</div>
    </div>

    <div class="card" style="margin-top:16px;">
        <h2>Active standards</h2>
        <div style="margin:8px 0;">
            <label style="font-size:12px;color:#666;">Subject:
                <input id="filter-subject" placeholder="biology"
                       style="margin-left:6px;padding:4px 6px;border:1px solid #ddd;border-radius:4px;font-size:13px;" />
            </label>
            <button type="button" id="filter-apply" class="upload-btn"
                    style="margin-left:8px;padding:4px 10px;font-size:12px;">Apply</button>
        </div>
        <div id="active-list" style="font-size:13px;color:#555;">Loading&hellip;</div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
(function () {
    function escapeHtml(s) {
        return (s || '').replace(/[&<>]/g, function (c) {
            return ({'&':'&amp;','<':'&lt;','>':'&gt;'})[c];
        });
    }

    function renderList(targetId, rows, showActions) {
        var target = document.getElementById(targetId);
        if (!rows.length) {
            target.textContent = '(none)';
            return;
        }
        var html = rows.map(function (r) {
            var actions = showActions
                ? '<div style="margin-top:6px;">' +
                  '<button type="button" data-action="approve" data-id="' + r.id + '" class="upload-btn" style="padding:4px 10px;font-size:12px;margin-right:6px;">Approve</button>' +
                  '<button type="button" data-action="edit" data-id="' + r.id + '" class="upload-btn" style="padding:4px 10px;font-size:12px;margin-right:6px;">Edit</button>' +
                  '<button type="button" data-action="reject" data-id="' + r.id + '" class="upload-btn" style="padding:4px 10px;font-size:12px;background:#fff;color:#c0392b;border-color:#c0392b;">Reject</button>' +
                  '</div>'
                : '<div style="margin-top:6px;">' +
                  '<button type="button" data-action="edit" data-id="' + r.id + '" class="upload-btn" style="padding:4px 10px;font-size:12px;">Edit</button>' +
                  '</div>';
            return '<div class="ss-row" data-id="' + r.id + '" style="border:1px solid #eee;border-radius:6px;padding:10px;margin:8px 0;">' +
                '<p style="margin:0 0 6px;" class="ss-text">' + escapeHtml(r.text) + '</p>' +
                '<p style="margin:0;color:#888;font-size:11px;">' +
                escapeHtml(r.subject) + ' • ' + (r.topic_keys || []).map(escapeHtml).join(', ') +
                ' • reinforced ' + (r.reinforcement_count || 0) + '× • ' + r.status +
                '</p>' +
                actions +
                '</div>';
        }).join('');
        target.innerHTML = html;
        bindActions(target);
    }

    function bindActions(scope) {
        scope.querySelectorAll('[data-action="approve"]').forEach(function (btn) {
            btn.addEventListener('click', function () {
                fetch('/api/subject_standards/' + btn.dataset.id + '/approve', { method: 'POST' })
                    .then(function () { location.reload(); });
            });
        });
        scope.querySelectorAll('[data-action="reject"]').forEach(function (btn) {
            btn.addEventListener('click', function () {
                if (!confirm('Reject (archive) this standard?')) return;
                fetch('/api/subject_standards/' + btn.dataset.id + '/reject', { method: 'POST' })
                    .then(function () { location.reload(); });
            });
        });
        scope.querySelectorAll('[data-action="edit"]').forEach(function (btn) {
            btn.addEventListener('click', function () {
                var row = btn.closest('.ss-row');
                var currentText = (row && row.querySelector('.ss-text')) ? row.querySelector('.ss-text').textContent : '';
                var next = prompt('Edit standard text:', currentText);
                if (next && next.trim()) {
                    fetch('/api/subject_standards/' + btn.dataset.id + '/edit', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text: next.trim() }),
                    }).then(function () { location.reload(); });
                }
            });
        });
    }

    function fetchPending() {
        fetch('/api/subject_standards?status=pending_review')
            .then(function (r) { return r.json(); })
            .then(function (data) { renderList('pending-list', data.standards || [], true); });
    }

    function fetchActive(subject) {
        var url = '/api/subject_standards?status=active';
        if (subject) url += '&subject=' + encodeURIComponent(subject);
        fetch(url).then(function (r) { return r.json(); }).then(function (data) {
            renderList('active-list', data.standards || [], false);
        });
    }

    document.getElementById('filter-apply').addEventListener('click', function () {
        fetchActive(document.getElementById('filter-subject').value.trim());
    });
    fetchPending();
    fetchActive('');
})();
</script>
{% endblock %}
